<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Pinball</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050508;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  canvas {
    display: block;
    border: 2px solid rgba(139, 92, 246, 0.4);
    box-shadow: 0 0 40px rgba(139, 92, 246, 0.2), inset 0 0 60px rgba(0,0,0,0.5);
    border-radius: 4px;
    cursor: none;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const W = 480, H = 700;
const GRAVITY = 0.15;
const BALL_RADIUS = 8;
const PADDLE_W = 120, PADDLE_H = 14;
const MIN_BOUNCE_VY = -8; // 最低向上反弹速度，越大越容易打到顶部
const BRICK_ROWS = 5, BRICK_COLS = 6;
const BRICK_W = 70, BRICK_H = 25, BRICK_GAP = 4;
const LEVEL_TARGETS = [500, 1200, 2500, 5000, 10000];
const BRICK_COLORS = ['#F472B6', '#FB923C', '#FACC15', '#4ADE80', '#38BDF8'];
const TRAIL_LENGTH = 8;

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = W;
canvas.height = H;

let state = 'menu';
let score = 0, lives = 30, level = 1, combo = 0;
let paddleX = W / 2;
const PADDLE_SPEED = 8;
const keys = { left: false, right: false };
let ball = { x: W/2, y: H - 100, vx: 0, vy: 0, trail: [] };
let paddle = { x: W/2 - PADDLE_W/2, y: H - 40 };
let bricks = [];
let particles = [];
let levelTimer = 0;
let menuPulse = 0;

function initBricks() {
  bricks = [];
  const totalW = BRICK_COLS * BRICK_W + (BRICK_COLS - 1) * BRICK_GAP;
  const startX = (W - totalW) / 2;
  for (let r = 0; r < BRICK_ROWS; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      if (level === 3 && Math.random() < 0.2) continue;
      bricks.push({
        x: startX + c * (BRICK_W + BRICK_GAP),
        y: 20 + r * (BRICK_H + BRICK_GAP),
        w: BRICK_W, h: BRICK_H,
        color: BRICK_COLORS[r],
        alive: true
      });
    }
  }
}

function resetBall() {
  ball.x = W / 2;
  ball.y = H - 100;
  ball.vx = (Math.random() - 0.5) * 3;
  ball.vy = -8;
  ball.trail = [];
}

function startGame() {
  score = 0; lives = 30; level = 1; combo = 0;
  initBricks(); resetBall();
  state = 'playing';
}

function spawnParticles(x, y, color, count = 10) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 30, maxLife: 30, color, size: 3 + Math.random() * 3
    });
  }
}

function circleRect(cx, cy, r, rx, ry, rw, rh) {
  const closestX = Math.max(rx, Math.min(cx, rx + rw));
  const closestY = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - closestX, dy = cy - closestY;
  return dx * dx + dy * dy < r * r;
}

function update() {
  if (state === 'menu') { menuPulse += 0.05; return; }
  if (state === 'levelComplete') {
    levelTimer--;
    if (levelTimer <= 0) {
      level++; initBricks(); resetBall(); state = 'playing';
    }
    return;
  }
  if (state === 'gameOver' || state === 'win') return;

  if (keys.left) paddleX = Math.max(0, paddleX - PADDLE_SPEED);
  if (keys.right) paddleX = Math.min(W - PADDLE_W, paddleX + PADDLE_SPEED);
  paddle.x = paddleX;

  ball.trail.push({ x: ball.x, y: ball.y });
  if (ball.trail.length > TRAIL_LENGTH) ball.trail.shift();

  ball.vy += GRAVITY;
  ball.x += ball.vx;
  ball.y += ball.vy;

  if (ball.x - BALL_RADIUS < 0) { ball.x = BALL_RADIUS; ball.vx = Math.abs(ball.vx) * 0.8; }
  if (ball.x + BALL_RADIUS > W) { ball.x = W - BALL_RADIUS; ball.vx = -Math.abs(ball.vx) * 0.8; }
  if (ball.y - BALL_RADIUS < 0) { ball.y = BALL_RADIUS; ball.vy = Math.abs(ball.vy) * 0.8; }

  if (circleRect(ball.x, ball.y, BALL_RADIUS, paddle.x, paddle.y, PADDLE_W, PADDLE_H)) {
    const hitPos = (ball.x - paddle.x) / PADDLE_W;
    const angle = (hitPos - 0.5) * Math.PI * 0.7;
    const speed = Math.max(Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy), 5);
    ball.vx = Math.sin(angle) * speed;
    ball.vy = -Math.abs(Math.cos(angle) * speed);
    ball.y = paddle.y - BALL_RADIUS;
    spawnParticles(ball.x, ball.y, '#8B5CF6', 4);
  }

  for (let b of bricks) {
    if (!b.alive) continue;
    if (circleRect(ball.x, ball.y, BALL_RADIUS, b.x, b.y, b.w, b.h)) {
      b.alive = false;
      const bCenterX = b.x + b.w / 2;
      const bCenterY = b.y + b.h / 2;
      const dx = ball.x - bCenterX, dy = ball.y - bCenterY;
      if (Math.abs(dx / b.w) > Math.abs(dy / b.h)) {
        ball.vx = dx > 0 ? Math.abs(ball.vx) : -Math.abs(ball.vx);
      } else {
        ball.vy = dy > 0 ? Math.abs(ball.vy) : -Math.abs(ball.vy);
      }
      ball.vx *= 0.5; ball.vy *= 0.5;
      if (ball.vy > MIN_BOUNCE_VY) ball.vy = MIN_BOUNCE_VY;
      combo++;
      const points = 10 * level + (combo > 1 ? (combo - 1) * 5 : 0);
      score += points;
      spawnParticles(b.x + b.w/2, b.y + b.h/2, b.color, 10);
      if (bricks.every(b => !b.alive)) {
        if (level === 5) { state = 'win'; }
        else { state = 'levelComplete'; levelTimer = 120; }
      }
      break;
    }
  }

  if (ball.y > H + BALL_RADIUS) {
    lives--; combo = 0;
    if (lives <= 0) { state = 'gameOver'; }
    else { resetBall(); }
  }

  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
    return p.life > 0;
  });
}

function shadeColor(color, percent) {
  const num = parseInt(color.replace('#',''), 16);
  const amt = Math.round(2.55 * percent);
  const R = Math.min(255, Math.max(0, (num >> 16) + amt));
  const G = Math.min(255, Math.max(0, ((num >> 8) & 0xFF) + amt));
  const B = Math.min(255, Math.max(0, (num & 0xFF) + amt));
  return `#${(0x1000000 + R*0x10000 + G*0x100 + B).toString(16).slice(1)}`;
}

function hexToRgba(hex, alpha) {
  const num = parseInt(hex.replace('#',''), 16);
  return `rgba(${(num>>16)&255},${(num>>8)&255},${num&255},${alpha})`;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function draw() {
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  for (let y = 0; y < H; y += 3) ctx.fillRect(0, y, W, 1);

  if (state === 'menu') {
    const glow = Math.sin(menuPulse) * 10 + 20;
    ctx.save();
    ctx.shadowColor = '#4ADE80'; ctx.shadowBlur = glow;
    ctx.fillStyle = '#4ADE80';
    ctx.font = 'bold 48px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('NEON', W/2, H/2 - 40);
    ctx.fillStyle = '#F472B6'; ctx.shadowColor = '#F472B6';
    ctx.fillText('PINBALL', W/2, H/2 + 20);
    ctx.restore();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '16px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('Press Space to Start', W/2, H/2 + 80);
    ctx.fillText('\u2190 \u2192 Arrow Keys to Move Paddle', W/2, H/2 + 105);
    return;
  }

  ctx.fillStyle = '#4ADE80';
  ctx.font = 'bold 18px Courier New';
  ctx.textAlign = 'left';
  ctx.shadowColor = '#4ADE80'; ctx.shadowBlur = 10;
  ctx.fillText(`SCORE: ${score.toString().padStart(5, '0')}`, 15, 30);
  ctx.textAlign = 'right';
  ctx.fillText(`LV:${level}`, W - 15, 30);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#06B6D4';
  ctx.font = 'bold 16px Courier New';
  ctx.shadowColor = '#06B6D4'; ctx.shadowBlur = 8;
  ctx.fillText(`\u2764 ${lives}`, 15, 58);
  ctx.shadowBlur = 0;

  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '12px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText(`TARGET: ${LEVEL_TARGETS[level-1]}`, 15, 72);

  for (let b of bricks) {
    if (!b.alive) continue;
    ctx.save();
    ctx.shadowColor = b.color; ctx.shadowBlur = 8;
    const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
    grad.addColorStop(0, b.color);
    grad.addColorStop(1, shadeColor(b.color, -30));
    ctx.fillStyle = grad;
    roundRect(ctx, b.x, b.y, b.w, b.h, 4);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    roundRect(ctx, b.x + 2, b.y + 2, b.w - 4, b.h - 4, 3);
    ctx.stroke();
    ctx.restore();
  }

  for (let i = 0; i < ball.trail.length; i++) {
    const t = ball.trail[i];
    const alpha = (i / ball.trail.length) * 0.4;
    const radius = BALL_RADIUS * (i / ball.trail.length) * 0.7;
    ctx.beginPath();
    ctx.arc(t.x, t.y, radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(6, 182, 212, ${alpha})`;
    ctx.fill();
  }

  ctx.save();
  ctx.shadowColor = '#06B6D4'; ctx.shadowBlur = 15;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(ball.x - 2, ball.y - 2, BALL_RADIUS * 0.4, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.shadowColor = '#8B5CF6'; ctx.shadowBlur = 15;
  const pGrad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x + PADDLE_W, paddle.y);
  pGrad.addColorStop(0, '#6366F1');
  pGrad.addColorStop(0.5, '#8B5CF6');
  pGrad.addColorStop(1, '#6366F1');
  ctx.fillStyle = pGrad;
  roundRect(ctx, paddle.x, paddle.y, PADDLE_W, PADDLE_H, 7);
  ctx.fill();
  ctx.restore();

  for (let p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fillStyle = hexToRgba(p.color, alpha);
    ctx.fill();
  }

  if (state === 'levelComplete') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.save();
    ctx.shadowColor = '#4ADE80'; ctx.shadowBlur = 20;
    ctx.fillStyle = '#4ADE80';
    ctx.font = 'bold 36px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(`LEVEL ${level} CLEAR!`, W/2, H/2);
    ctx.restore();
  }

  if (state === 'gameOver') {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0, 0, W, H);
    ctx.save();
    ctx.shadowColor = '#EF4444'; ctx.shadowBlur = 20;
    ctx.fillStyle = '#EF4444';
    ctx.font = 'bold 40px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W/2, H/2 - 20);
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.font = '20px Courier New';
    ctx.fillText(`Score: ${score}`, W/2, H/2 + 25);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '14px Courier New';
    ctx.fillText('Click to restart', W/2, H/2 + 60);
    ctx.restore();
  }

  if (state === 'win') {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0, 0, W, H);
    ctx.save();
    ctx.shadowColor = '#FACC15'; ctx.shadowBlur = 30;
    ctx.fillStyle = '#FACC15';
    ctx.font = 'bold 48px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('YOU WIN!', W/2, H/2 - 30);
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.font = '20px Courier New';
    ctx.fillText(`Final Score: ${score}`, W/2, H/2 + 20);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '14px Courier New';
    ctx.fillText('Click to play again', W/2, H/2 + 55);
    ctx.restore();
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
  if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
  if (e.key === ' ' || e.key === 'Enter') {
    if (state === 'menu') startGame();
    else if (state === 'gameOver' || state === 'win') state = 'menu';
  }
});

document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
  if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
});

canvas.addEventListener('click', () => {
  if (state === 'menu') startGame();
  else if (state === 'gameOver' || state === 'win') state = 'menu';
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  paddleX = e.touches[0].clientX - rect.left;
}, { passive: false });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state === 'menu') startGame();
  else if (state === 'gameOver' || state === 'win') state = 'menu';
}, { passive: false });

gameLoop();
</script>
</body>
</html>
